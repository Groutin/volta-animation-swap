  <style>
html, body {
  background-color: #23323a;
  width: 100%; height: 100%;
  margin: 0; border: 0; outline: 0;
  overflow: hidden;
  transition: background-color 1.2s ease;
}
body {
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
#Layer1 { width: 50%; }

#Layer1 {
  overflow: initial;
  z-index: 50;
  position: relative;
}
#Volta-emblem {
  stroke: white;
  stroke-width: 0.8px;
  fill: transparent;
  stroke-dasharray: 626, 515;
  stroke-dashoffset: 627;
  animation: pulse 12s ease infinite;
}
#Layer2 {
  position: absolute;
  fill: none;
  overflow: initial;
  width: 501%;
  left: -165.1%;
  z-index: 48;
  top: 22.8%;
  stroke: #0bbdc2;
  filter: blur(7px);
  stroke-width: 7px;
  stroke-dasharray: 800 95%;
  stroke-dashoffset: 104%;
  animation: ecg-lighting 5s linear infinite;
}

/* Logo glow overlay canvas */
#logo-canvas {
  position: absolute;
  width: 100%; height: 100%;
  top: 0; left: 0;
  z-index: 51;
  pointer-events: none;
}
/* Background particle canvas */
#ecg-canvas {
  position: absolute;
  width: 100%; height: 100%;
  top: 0; left: 0;
  z-index: 48;
  pointer-events: none;
}

@keyframes pulse {
  0%   { stroke-dashoffset:627; stroke:transparent; fill:transparent; }
  5%   { stroke-dashoffset:627; stroke:#11F5FF; filter:drop-shadow(0 0 6px #0abbbb); }
  20%  { filter:drop-shadow(0 0 4px #0abbbb); }
  25%  { fill:transparent; }
  50%  { stroke-dashoffset:0; stroke:#11F5FF; filter:drop-shadow(0 0 0px #0abbbb); fill:#11F5FF; }
  75%  { fill:transparent; }
  80%  { filter:drop-shadow(0 0 4px #0abbbb); }
  95%  { stroke-dashoffset:627; stroke:#11F5FF; filter:drop-shadow(0 0 6px #0abbbb); }
  100% { stroke-dashoffset:627; stroke:transparent; fill:transparent; }
}
@keyframes ecg-lighting {
  25%  { stroke-dashoffset:104%; }
  100% { stroke-dashoffset:170%; }
}

/* ══════════════════════════════
   THEME SWITCHER — side panel left
══════════════════════════════ */
#theme-switcher {
  position: fixed;
  top: 50%;
  left: 0;
  transform: translateY(-50%);
  z-index: 999;
  display: flex;
  flex-direction: row;
  align-items: center;
  pointer-events: auto;
}

/* The slim tab that's always visible */
#theme-tab {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  padding: 0;
  background: rgba(12,14,18,0.52);
  backdrop-filter: blur(14px);
  border-radius: 0 8px 8px 0;
  border: 1px solid rgba(255,255,255,0.08);
  border-left: none;
  cursor: pointer;
  transition: background 0.22s, transform 0.22s, border-color 0.22s;
  box-shadow: 3px 0 14px rgba(0,0,0,0.3);
}
#theme-tab:hover {
  background: rgba(20,22,28,0.72);
  border-color: rgba(255,255,255,0.16);
}
#theme-switcher.open #theme-tab {
  border-radius: 0;
  border-color: rgba(255,255,255,0.06);
}
#theme-tab-icon {
  width: 14px;
  height: 14px;
  color: rgba(255,255,255,0.45);
  transition: color 0.22s, transform 0.3s ease;
  flex-shrink: 0;
}
#theme-tab:hover #theme-tab-icon {
  color: rgba(255,255,255,0.75);
}
#theme-switcher.open #theme-tab-icon {
  transform: rotate(90deg);
  color: rgba(255,255,255,0.6);
}

/* The expandable panel */
#theme-panel {
  display: flex;
  flex-direction: column;
  gap: 0;
  background: rgba(10,12,16,0.82);
  backdrop-filter: blur(20px);
  border-radius: 0 12px 12px 0;
  border: 1px solid rgba(255,255,255,0.09);
  border-left: none;
  overflow: hidden;
  width: 0;
  opacity: 0;
  pointer-events: none;
  transition: width 0.32s cubic-bezier(.4,0,.2,1),
              opacity 0.28s ease;
  box-shadow: 4px 0 24px rgba(0,0,0,0.4);
  max-height: 90vh;
  overflow-y: auto;
  scrollbar-width: none;
}
#theme-panel::-webkit-scrollbar { display: none; }

#theme-switcher.open #theme-panel {
  width: 180px;
  opacity: 1;
  pointer-events: auto;
}

/* Individual theme row */
.theme-btn {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 10px 16px;
  cursor: pointer;
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  transition: background 0.18s;
  white-space: nowrap;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.theme-btn:last-child { border-bottom: none; }
.theme-btn:hover { background: rgba(255,255,255,0.06); }
.theme-btn.active { background: rgba(255,255,255,0.08); }

.theme-btn .dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: transform 0.2s, box-shadow 0.2s;
}
.theme-btn:hover .dot { transform: scale(1.2); }
.theme-btn.active .dot {
  transform: scale(1.25);
  box-shadow: 0 0 8px currentColor !important;
}

.theme-btn .theme-label {
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  transition: color 0.18s;
}
.theme-btn:hover .theme-label { color: rgba(255,255,255,0.85); }
.theme-btn.active .theme-label { color: rgba(255,255,255,0.9); }

/* Per-theme dot colors */
.theme-btn[data-theme="cyan"]   .dot { background: #11F5FF; color: #11F5FF; box-shadow: 0 0 5px rgba(17,245,255,0.6); }
.theme-btn[data-theme="red"]    .dot { background: #ff3322; color: #ff3322; box-shadow: 0 0 5px rgba(255,51,34,0.6); }
.theme-btn[data-theme="silver"] .dot { background: #E6E6E9; color: #E6E6E9; box-shadow: 0 0 4px rgba(153,153,161,0.6); }
.theme-btn[data-theme="green"]  .dot { background: #AABD8C; color: #AABD8C; box-shadow: 0 0 5px rgba(120,165,70,0.6); }
.theme-btn[data-theme="violet"] .dot { background: #7d6b91; color: #7d6b91; box-shadow: 0 0 5px rgba(152,159,206,0.6); }
.theme-btn[data-theme="neon"]   .dot { background: #8cd867; color: #8cd867; box-shadow: 0 0 6px rgba(140,216,103,0.7); }
.theme-btn[data-theme="slate"]  .dot { background: #b5bec6; color: #b5bec6; box-shadow: 0 0 5px rgba(181,190,198,0.6); }
.theme-btn[data-theme="amber"]  .dot { background: #f4d35e; color: #f4d35e; box-shadow: 0 0 5px rgba(244,211,94,0.6); }
.theme-btn[data-theme="crimson"] .dot { background: #fb4b4e; color: #fb4b4e; box-shadow: 0 0 5px rgba(251,75,78,0.6); }


  
/* ─── HEART POLYGONAL ─── */
/*
  Logo (#Layer1) : width=50vw, viewBox 820×240
  → hauteur rendue = 50vw × (240/820) ≈ 14.63vw
  Le cœur est calé à 90% de cette hauteur ≈ 13.17vw,
  ce qui reproduit exactement la proportion originale (253px sur 1920px)
  et s'adapte dynamiquement à toute taille d'écran.
*/
:root {
  --logo-h: calc(50vw * 240 / 820);
  --heart-size: calc(var(--logo-h) * 1.26);
}
#heart-wrapper {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: var(--heart-size);
  height: var(--heart-size);
  z-index: 49;
  pointer-events: none;
  animation: heart-fade 12s ease infinite;
  will-change: opacity;
  /* opacity driven by JS crossfade — no CSS transition on opacity */
}

@keyframes heart-fade {
  0%   { opacity: 0.9; }
  5%   { opacity: 0.8; }
  25%  { opacity: 0.55; }
  50%  { opacity: 0.35; }
  75%  { opacity: 0.55; }
  95%  { opacity: 0.8; }
  100% { opacity: 0.9; }
}
#heart-wrapper svg {
  width: 100%;
  height: 100%;
  position: static;
  overflow: visible;
  filter: drop-shadow(0 0 10px #00c8cc);
  opacity: 0.82;
}

<script>
/* ─────────────────────────────────────────
   All variables declared before any call
───────────────────────────────────────── */
const bgCanvas  = document.getElementById('ecg-canvas');
const bgCtx     = bgCanvas.getContext('2d', {alpha:true});
const logoCanvas = document.getElementById('logo-canvas');
const logoCtx    = logoCanvas.getContext('2d', {alpha:true});
bgCtx.imageSmoothingEnabled   = false;
logoCtx.imageSmoothingEnabled = false;

function rand(a, b) { return a + Math.random() * (b - a); }
function getEcgY()  { return bgCanvas.height * 0.455; }
function getLogoCX(){ return bgCanvas.width  * 0.5; }
function getLogoCY(){ return bgCanvas.height * 0.455; }

/* ── size both canvases ── */
function resizeCanvases() {
  bgCanvas.width    = logoCanvas.width    = window.innerWidth;
  bgCanvas.height   = logoCanvas.height   = window.innerHeight;
}
resizeCanvases();
window.addEventListener('resize', resizeCanvases);

/* ════════════════════════════════════════
   BACKGROUND LAYER
════════════════════════════════════════ */

/* ── Lightning ── */
function boltPath(x1,y1,x2,y2,rough,segs){
  const pts=[{x:x1,y:y1}];
  const len=Math.hypot(x2-x1,y2-y1)||1;
  const nx=-(y2-y1)/len, ny=(x2-x1)/len;
  for(let i=1;i<segs;i++){
    const t=i/segs, off=(Math.random()-0.5)*rough;
    pts.push({x:x1+(x2-x1)*t+nx*off, y:y1+(y2-y1)*t+ny*off});
  }
  pts.push({x:x2,y:y2});
  return pts;
}
function drawBolt(ctx,pts,alpha,color,width){
  if(alpha<=0)return;
  const a=Math.min(0.55,alpha*0.55);
  ctx.save();
  ctx.globalAlpha=a; ctx.strokeStyle=color; ctx.lineWidth=width;
  ctx.shadowColor=color; ctx.shadowBlur=6;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.stroke();
  ctx.globalAlpha=a*0.45; ctx.strokeStyle='#fff'; ctx.lineWidth=width*0.25; ctx.shadowBlur=2;
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.stroke();
  ctx.restore();
}

const sparks = [];
function spawnSparks(x,y,count){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, sp=rand(0.6,2.8);
    sparks.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-0.6,life:1,decay:rand(0.04,0.07),size:rand(0.6,1.6)});
  }
}
const bolts=[];
let boltTimer=0;
function spawnBolt(){
  const ecgY=getEcgY(), type=Math.random();
  let x1=rand(0,bgCanvas.width),y1,x2,y2;
  if(type<0.35){ y1=ecgY+rand(-6,6); x2=x1+rand(-180,180); y2=ecgY+rand(-6,6); }
  else if(type<0.65){ y1=ecgY; x2=x1+rand(-60,60); y2=ecgY-rand(18,75); }
  else{ y1=ecgY; x2=x1+rand(-60,60); y2=ecgY+rand(18,75); }
  const colors=['#11F5FF','#00d4e0','#00b8cc','#40ffff','#7affff'];
  const color=(window._themeColors||THEMES.cyan).boltColors[Math.floor(Math.random()*5)];
  const pts=boltPath(x1,y1,x2,y2,rand(16,30),5+Math.floor(rand(0,7)));
  const branch=Math.random()<0.3?boltPath(pts[1+Math.floor(rand(0,pts.length-2))].x,pts[1+Math.floor(rand(0,pts.length-2))].y,pts[1].x+rand(-45,45),pts[1].y+rand(-35,35),10,3+Math.floor(rand(0,3))):null;
  bolts.push({pts,branch,color,life:1,decay:rand(0.07,0.14),width:rand(0.6,1.7),spawnedSparks:false,x2,y2});
}

/* ── Blood cells ── */
const cells=[];
for(let i=0;i<20;i++){
  cells.push({
    x:rand(0,1920), y:rand(0,1080),
    rx:rand(5,11), ry:rand(3,6),
    angle:rand(0,Math.PI),
    vx:rand(-0.15,0.15), vy:rand(-0.08,0.08),
    rot:rand(-0.003,0.003),
    alpha:rand(0.04,0.13),
    phase:rand(0,Math.PI*2)
  });
}
function drawCells(t){
  for(const c of cells){
    if(t > EXPLODE_DURATION){ c.x+=c.vx; c.y+=c.vy; } c.angle+=c.rot;
    if(c.x<-20) c.x=bgCanvas.width+20;
    if(c.x>bgCanvas.width+20) c.x=-20;
    if(c.y<-20) c.y=bgCanvas.height+20;
    if(c.y>bgCanvas.height+20) c.y=-20;
    bgCtx.save(); /* keep for translate/rotate */
    bgCtx.globalAlpha=c.alpha*(0.6+0.4*Math.sin(t*0.018+c.phase));
    bgCtx.translate(c.x,c.y); bgCtx.rotate(c.angle);
    bgCtx.lineWidth=0.8; bgCtx.strokeStyle='#0e8090';
    bgCtx.beginPath(); bgCtx.ellipse(0,0,c.rx,c.ry,0,0,Math.PI*2); bgCtx.stroke();
    bgCtx.lineWidth=0.5; bgCtx.strokeStyle='#0a6070';
    bgCtx.beginPath(); bgCtx.ellipse(0,0,c.rx*0.42,c.ry*0.42,0,0,Math.PI*2); bgCtx.stroke();
    bgCtx.restore();
  }
}

/* ── ECG band particles ── */

/* ── Fibres / filaments drifting diagonally ── */
const fibres=[];
/* grille 5×2 pour répartir les fibres uniformément sur l'écran */
(function(){
  const cols=5, rows=2;
  const cw=1920/cols, rh=1080/rows;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      fibres.push({
        x: cw*c + rand(cw*0.1, cw*0.9),
        y: rh*r + rand(rh*0.1, rh*0.9),
        len:rand(50,140), angle:rand(0,Math.PI),
        vx:rand(-0.1,0.1), vy:rand(0.05,0.15),
        alpha:rand(0.15,0.45), phase:rand(0,Math.PI*2)
      });
    }
  }
})();
function drawFibres(t){
  for(const f of fibres){
    f.x+=f.vx; f.y+=f.vy;
    if(f.y>bgCanvas.height+20){
      f.y=-20;
      const col=Math.floor(rand(0,5));
      const cw=bgCanvas.width/5;
      f.x=cw*col+rand(cw*0.1,cw*0.9);
    }

    bgCtx.globalAlpha=f.alpha*(0.5+0.5*Math.sin(t*0.02+f.phase));

    bgCtx.shadowColor='#0bbdc2';
    bgCtx.shadowBlur=4;

/* ── Sparks ejected from logo ── */
const logoSparks=[];
let logoSparkTimer=0;
function spawnLogoSparks(){
  const T = window._themeColors || THEMES.cyan;
  const cx=getLogoCX(), cy=getLogoCY();
  const count=2+Math.floor(rand(0,4));
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, sp=rand(0.5,2.5);
    logoSparks.push({
      x:cx+rand(-30,30), y:cy+rand(-30,30),
      vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      life:1, decay:rand(0.015,0.04), size:rand(0.8,2.0),

    });

/* ── Logo electricity arcs between random logo points ── */
const logoArcs=[];
let logoArcTimer=0;
function spawnLogoArc(){
  const T = window._themeColors || THEMES.cyan;
  const cx=getLogoCX(), cy=getLogoCY();
  const spread=rand(40,120);
  const a1=rand(0,Math.PI*2), a2=a1+rand(0.4,1.8)*(Math.random()<0.5?1:-1);
  const r1=rand(20,50), r2=rand(20,50);
  logoArcs.push({
    pts: boltPath(
      cx+Math.cos(a1)*r1, cy+Math.sin(a1)*r1,
      cx+Math.cos(a2)*r2, cy+Math.sin(a2)*r2,
      rand(8,22), 4+Math.floor(rand(0,4))
    ),
    life:1, decay:rand(0.06,0.14), color:T.logoArcColor, width:rand(0.5,1.2)
  });
}

function drawLogoEffects(t){
  const T = window._themeColors || THEMES.cyan;
  logoCtx.clearRect(0,0,logoCanvas.width,logoCanvas.height);
  const cx=getLogoCX(), cy=getLogoCY();

  /* Logo glow — skip recompute on frames where gp change is imperceptible (<0.001) */
  const gp=0.04+0.025*Math.sin(t*0.03);
  if(!drawLogoEffects._lastGp || Math.abs(gp-drawLogoEffects._lastGp)>0.002 || drawLogoEffects._lastTheme!==currentTheme){
    const glow=logoCtx.createRadialGradient(cx,cy,0,cx,cy,180);
    glow.addColorStop(0,T.glowStop0(gp));
    glow.addColorStop(0.4,T.glowStop4(gp));
    glow.addColorStop(1,T.glowStop1);
    drawLogoEffects._cachedGlow=glow;
    drawLogoEffects._lastGp=gp;
    drawLogoEffects._lastTheme=currentTheme;
  }
  logoCtx.fillStyle=drawLogoEffects._cachedGlow;
  logoCtx.beginPath(); logoCtx.arc(cx,cy,180,0,Math.PI*2); logoCtx.fill();

  /* orbiting particles */
  for(const o of orbiters){
    o.angle+=o.speed;
    const ox=cx+Math.cos(o.angle)*o.orbitR;
    const oy=cy+Math.sin(o.angle)*o.orbitR*0.35;
    logoCtx.globalAlpha=o.alpha*(0.5+0.5*Math.sin(t*0.04+o.phase));
    logoCtx.fillStyle=T.orbiterColors[Math.round(o._colorIdx||0)];
    logoCtx.beginPath(); logoCtx.arc(ox,oy,o.r,0,Math.PI*2); logoCtx.fill();
  }
  logoCtx.globalAlpha=1;

  /* logo electricity arcs */
  logoArcTimer--;
  if(logoArcTimer<=0){ spawnLogoArc(); logoArcTimer=18+Math.floor(rand(0,30)); }
  for(let i=logoArcs.length-1;i>=0;i--){
    const la=logoArcs[i];
    drawBolt(logoCtx,la.pts,la.life*0.8,T.logoArcColor,la.width);
    la.life-=la.decay;
    if(la.life<=0) logoArcs.splice(i,1);
  }

  /* logo sparks */
  logoSparkTimer--;
  if(logoSparkTimer<=0){ spawnLogoSparks(); logoSparkTimer=30+Math.floor(rand(0,40)); }
  logoCtx.save();
  logoCtx.shadowBlur=8;
  for(let i=logoSparks.length-1;i>=0;i--){
    const s=logoSparks[i];
    logoCtx.globalAlpha=s.life*0.8;
    logoCtx.fillStyle=s.color;
    logoCtx.shadowColor=s.color;
    logoCtx.beginPath(); logoCtx.arc(s.x,s.y,s.size*s.life,0,Math.PI*2); logoCtx.fill();
    s.x+=s.vx; s.y+=s.vy; s.vy+=0.04; s.life-=s.decay;
    if(s.life<=0) logoSparks.splice(i,1);
  }
  logoCtx.restore();
}

/* ════════════════════════════════════════
   EXPLOSION INTRO
════════════════════════════════════════ */
const EXPLODE_DURATION = 90; // ~1.5s à 60fps

(function initExplosion(){
  const cx = bgCanvas.width  / 2;
  const cy = bgCanvas.height / 2;
  for(const p of dustPts){    p._tx=p.x; p._ty=p.y; p.x=cx; p.y=cy; }
  for(const p of ecgBandPts){ p._tx=p.x; p._ty=p.y; p.x=cx; p.y=cy; }
  for(const p of sparkles){   p._tx=p.x; p._ty=p.y; p.x=cx; p.y=cy; }
  for(const c of cells){      c._tx=c.x; c._ty=c.y; c.x=cx; c.y=cy; }
})();

function easeOutExpo(x){ return x>=1?1:1-Math.pow(2,-10*x); }

/* ════════════════════════════════════════
   MAIN LOOP
════════════════════════════════════════ */
let t=0;
function animate(){
  requestAnimationFrame(animate);
  t++;

  /* ── Interpolation explosion ── */
  if(t <= EXPLODE_DURATION){
    const progress = easeOutExpo(t / EXPLODE_DURATION);
    const cx = bgCanvas.width / 2, cy = bgCanvas.height / 2;
    for(const p of dustPts){    p.x=cx+(p._tx-cx)*progress; p.y=cy+(p._ty-cy)*progress; }
    for(const p of ecgBandPts){ p.x=cx+(p._tx-cx)*progress; p.y=cy+(p._ty-cy)*progress; }
    for(const p of sparkles){   p.x=cx+(p._tx-cx)*progress; p.y=cy+(p._ty-cy)*progress; }
    for(const c of cells){      c.x=cx+(c._tx-cx)*progress; c.y=cy+(c._ty-cy)*progress; }
  }

  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);

  /* ── Flash explosion central ── */
  if(t <= EXPLODE_DURATION){
    const _TF = window._themeColors || THEMES.cyan;
    const flashProgress = t / EXPLODE_DURATION;
    const shockR   = flashProgress * Math.max(bgCanvas.width, bgCanvas.height) * 0.85;
    const shockAlpha = Math.max(0, (1 - flashProgress) * 0.35);
    const cx = bgCanvas.width/2, cy = bgCanvas.height/2;
    const shockGrad = bgCtx.createRadialGradient(cx,cy,shockR*0.7,cx,cy,shockR);
    shockGrad.addColorStop(0,`${_TF.shockColor1}0)`);
    shockGrad.addColorStop(0.7,`${_TF.shockColor1}${shockAlpha})`);
    shockGrad.addColorStop(1,_TF.shockColor2);
    bgCtx.fillStyle=shockGrad;
    bgCtx.beginPath(); bgCtx.arc(cx,cy,shockR,0,Math.PI*2); bgCtx.fill();
    if(flashProgress < 0.3){
      const glowAlpha = (1 - flashProgress/0.3) * 0.55;
      const glowGrad = bgCtx.createRadialGradient(cx,cy,0,cx,cy,120);
      glowGrad.addColorStop(0,`${_TF.flashColor1}${glowAlpha})`);
      glowGrad.addColorStop(0.4,`${_TF.flashColor2}${glowAlpha*0.6})`);
      glowGrad.addColorStop(1,_TF.flashColor3);
      bgCtx.fillStyle=glowGrad;
      bgCtx.beginPath(); bgCtx.arc(cx,cy,120,0,Math.PI*2); bgCtx.fill();
    }
  }

  /* ECG haze — gradient recreated only when needed (ecgY is constant post-resize) */
  const ecgY=getEcgY();
  const hp=0.028+0.018*Math.sin(t*0.025);
  const _T=window._themeColors;
  const grad=bgCtx.createLinearGradient(0,ecgY-36,0,ecgY+36);
  grad.addColorStop(0,_T.ecgHaze0);
  grad.addColorStop(0.45,_T.ecgHaze45(hp));
  grad.addColorStop(0.55,_T.ecgHaze55(hp));
  grad.addColorStop(1,_T.ecgHaze1);
  bgCtx.fillStyle=grad;
  bgCtx.fillRect(0,ecgY-36,bgCanvas.width,72);

  drawDust(t);
  drawSparkles(t);
  // drawFibres(t); // fibres masquées
  drawCells(t);
  drawEcgPts(t);
  /* lightning */
  boltTimer--;
  if(boltTimer<=0){
    const cnt=1+Math.floor(rand(0,3));
    for(let i=0;i<cnt;i++) spawnBolt();
    boltTimer=8+Math.floor(rand(0,20));
  }
  for(let i=bolts.length-1;i>=0;i--){
    const b=bolts[i];
    drawBolt(bgCtx,b.pts,b.life,b.color,b.width);
    if(b.branch) drawBolt(bgCtx,b.branch,b.life*0.55,b.color,b.width*0.45);
    if(!b.spawnedSparks&&b.life<0.6){ spawnSparks(b.x2,b.y2,2+Math.floor(rand(0,4))); b.spawnedSparks=true; }
    b.life-=b.decay;
    if(b.life<=0) bolts.splice(i,1);
  }
  if(sparks.length){
    bgCtx.save();
    bgCtx.fillStyle=_T.sparksFill; bgCtx.shadowColor=_T.sparksShadow; bgCtx.shadowBlur=4;
    for(let i=sparks.length-1;i>=0;i--){
      const s=sparks[i];
      bgCtx.globalAlpha=s.life*0.7;
      bgCtx.beginPath(); bgCtx.arc(s.x,s.y,s.size*s.life,0,Math.PI*2); bgCtx.fill();
      s.x+=s.vx; s.y+=s.vy; s.vy+=0.06; s.life-=s.decay;
      if(s.life<=0) sparks.splice(i,1);
    }
    bgCtx.restore();
  }

  /* logo layer */
  drawLogoEffects(t);
}

/* ════════════════════════════════════════
   HEART CROSSFADE  — smooth theme transition
   Strategy: clone the heart wrapper, apply new theme CSS
   to an off-screen <style>, crossfade via opacity on two
   absolutely-positioned layers. CSS fills on hundreds of
   <polygon> elements can't tween, so we visually blend
   the before/after renders.
════════════════════════════════════════ */
let _heartTransitionRAF = null;
let _heartStyleTag = null;

function transitionHeart(targetTheme) {
  const DURATION = 900; // ms

  /* Ensure the dynamic style tag exists */
  if(!_heartStyleTag){
    _heartStyleTag = document.createElement('style');
    _heartStyleTag.id = 'dynamic-heart-style';
    document.head.appendChild(_heartStyleTag);
  }

  const wrapper = document.getElementById('heart-wrapper');
  if(!wrapper) return;

  /* Cancel any in-progress transition */
  if(_heartTransitionRAF) cancelAnimationFrame(_heartTransitionRAF);

  /* ── Strategy: NEVER touch animationPlayState — it desyncs heart-fade.
     Instead, wrap the crossfade in an intermediate overlay div that sits
     on top and fades from old-colors to new-colors, while #heart-wrapper
     keeps its heart-fade animation running uninterrupted at all times.   */

  /* 1. Snapshot current visual into a frozen clone (old colors) */
  const currentOpacity = parseFloat(getComputedStyle(wrapper).opacity);
  const clone = wrapper.cloneNode(true);
  clone.removeAttribute('id');
  clone.setAttribute('style', [
    'position:absolute',
    'top:50%', 'left:50%',
    'transform:translate(-50%,-50%)',
    'width:'  + wrapper.offsetWidth  + 'px',
    'height:' + wrapper.offsetHeight + 'px',
    'opacity:' + currentOpacity,
    'pointer-events:none',
    'z-index:50',        /* above wrapper so it covers during fade-out */
    'animation:none',
    'will-change:opacity'
  ].join(';'));
  clone.querySelectorAll('*').forEach(el => { el.style.animation = 'none'; });
  wrapper.parentNode.insertBefore(clone, wrapper.nextSibling); /* AFTER wrapper */

  /* 2. Swap colors on the real wrapper immediately — it is hidden behind clone */
  if(targetTheme === 'red'){
    _heartStyleTag.textContent = RED_HEART_CSS;
  } else if(targetTheme === 'silver'){
    _heartStyleTag.textContent = SILVER_HEART_CSS;
  } else if(targetTheme === 'green'){
    _heartStyleTag.textContent = GREEN_HEART_CSS;
  } else if(targetTheme === 'violet'){
    _heartStyleTag.textContent = VIOLET_HEART_CSS;
  } else if(targetTheme === 'neon'){
    _heartStyleTag.textContent = NEON_HEART_CSS;
  } else if(targetTheme === 'slate'){
    _heartStyleTag.textContent = SLATE_HEART_CSS;
  } else if(targetTheme === 'amber'){
    _heartStyleTag.textContent = AMBER_HEART_CSS;
  } else if(targetTheme === 'crimson'){
    _heartStyleTag.textContent = CRIMSON_HEART_CSS;
  } else {
    _heartStyleTag.textContent = '';
  }

  /* 3. Crossfade: clone (old) fades out, wrapper (new) shows through.
     heart-fade continues uninterrupted on wrapper — no pause, no reset. */
  const start = performance.now();
  function step(now) {
    const p = Math.min(1, (now - start) / DURATION);
    const e = p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2,3)/2;

    /* Clone fades from currentOpacity → 0, revealing the live wrapper beneath */
    clone.style.opacity = String(currentOpacity * (1 - e));

    if(p < 1){
      _heartTransitionRAF = requestAnimationFrame(step);
    } else {
      clone.remove();
      _heartTransitionRAF = null;
    }
  }
  _heartTransitionRAF = requestAnimationFrame(step);
}

let currentTheme = 'cyan';

function applyTheme(name, skipTransition=false) {
  const T = THEMES[name];
  currentTheme = name;

  /* BG color */
  document.documentElement.style.setProperty('background-color','');
  document.body.style.backgroundColor = T.bg;
  document.querySelector('html').style.backgroundColor = T.bg;

  /* ECG SVG stroke */
  const layer2 = document.getElementById('Layer2');
  if(layer2) layer2.style.stroke = T.ecgStroke;

  /* ── Heart smooth crossfade ── */
  if(!skipTransition) transitionHeart(name);

  /* pulse keyframe override via style tag */
  let styleTag = document.getElementById('dynamic-theme-style');
  if(!styleTag){ styleTag=document.createElement('style'); styleTag.id='dynamic-theme-style'; document.head.appendChild(styleTag); }

  const pulseKf = T.pulse.map(p=>`  ${p.pct} { ${p.v} }`).join('\n');
  styleTag.textContent = `
    html, body { background-color: ${T.bg} !important; }
    #heart-wrapper svg { filter: ${T.heartGlow}; }
    @keyframes pulse {
  ${pulseKf}
    }
    @-webkit-keyframes pulse {
  ${pulseKf}
    }
    @keyframes fill-ani {
      from { fill-opacity:0; stroke:${T.fillAniStroke}; stroke-width:1px; stroke-dashoffset:2000; }
    }
    @-webkit-keyframes fill-ani {
      from { fill-opacity:0; stroke:${T.fillAniStroke}; stroke-width:1px; stroke-dashoffset:2000; }
    }
  `;

  /* Restart pulse animation */
  const emblem = document.getElementById('Volta-emblem');
  if(emblem){
    emblem.style.animation='none';
    emblem.offsetHeight; // reflow
    emblem.style.animation='';
  }

  /* Update runtime color vars for canvas */
  window._themeColors = T;

  /* Active button state */
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme===name));

}

/* Theme panel — tab toggles open/close */
const themeTab   = document.getElementById('theme-tab');
const themeSwitcher = document.getElementById('theme-switcher');

themeTab.addEventListener('click', ()=>{
  themeSwitcher.classList.toggle('open');
});
document.addEventListener('click', (e)=>{
  if(!themeSwitcher.contains(e.target)){
    themeSwitcher.classList.remove('open');
  }
});
document.querySelectorAll('.theme-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    applyTheme(btn.dataset.theme);
    themeSwitcher.classList.remove('open');
  });
});

/* Tab uses icon only — no swatch update needed */

/* Init — apply cyan without crossfade (page load) */
window._themeColors = THEMES.cyan;
applyTheme('cyan', true); // true = skipTransition

/* ── Override draw functions to be theme-aware ── */
const _origDrawDust = drawDust;
const _origDrawSparkles = drawSparkles;
const _origDrawCells = drawCells;
const _origDrawEcgPts = drawEcgPts;

function drawDust(t){
  const T = window._themeColors;
  /* Move all, then draw grouped by color type — 3 fill calls vs 95 */
  for(const p of dustPts){
    if(t > EXPLODE_DURATION){ p.x+=p.vx; p.y+=p.vy; }
    if(p.x<0) p.x=bgCanvas.width; if(p.x>bgCanvas.width) p.x=0;
    if(p.y<0) p.y=bgCanvas.height; if(p.y>bgCanvas.height) p.y=0;
  }
  for(let type=0;type<3;type++){
    bgCtx.fillStyle=T.dustColors[type];
    bgCtx.beginPath();
    for(const p of dustPts){
      if(p.type!==type) continue;
      bgCtx.globalAlpha=p.alpha*(0.5+0.5*Math.sin(t*0.03+p.phase));
      bgCtx.moveTo(p.x+p.r,p.y);
      bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    }
    bgCtx.fill();
  }
  bgCtx.globalAlpha=1;
}

function drawSparkles(t){
  const T = window._themeColors;
  /* Batch: one fillStyle, no shadowBlur (particles <2.2px — blur imperceptible) */
  bgCtx.fillStyle = T.sparklesFill;
  for(const s of sparkles){
    if(t > EXPLODE_DURATION){ s.x+=s.vx; s.y+=s.vy; }
    if(s.x<0) s.x=bgCanvas.width; if(s.x>bgCanvas.width) s.x=0;
    if(s.y<0) s.y=bgCanvas.height; if(s.y>bgCanvas.height) s.y=0;
    bgCtx.globalAlpha = s.alpha * Math.abs(Math.sin(t*s.twinkleSpeed+s.phase));
    bgCtx.beginPath(); bgCtx.arc(s.x,s.y,s.r,0,Math.PI*2); bgCtx.fill();
  }
  bgCtx.globalAlpha=1;
}

function drawCells(t){
  const T = window._themeColors;
  for(const c of cells){
    if(t > EXPLODE_DURATION){ c.x+=c.vx; c.y+=c.vy; } c.angle+=c.rot;
    if(c.x<-20) c.x=bgCanvas.width+20;
    if(c.x>bgCanvas.width+20) c.x=-20;
    if(c.y<-20) c.y=bgCanvas.height+20;
    if(c.y>bgCanvas.height+20) c.y=-20;
    /* Use setTransform instead of save/translate/rotate/restore — no stack push/pop */
    const cos=Math.cos(c.angle), sin=Math.sin(c.angle);
    bgCtx.setTransform(cos,sin,-sin,cos,c.x,c.y);
    bgCtx.globalAlpha=c.alpha*(0.6+0.4*Math.sin(t*0.018+c.phase));
    bgCtx.lineWidth=0.8; bgCtx.strokeStyle=T.cellOuter;
    bgCtx.beginPath(); bgCtx.ellipse(0,0,c.rx,c.ry,0,0,Math.PI*2); bgCtx.stroke();
    bgCtx.lineWidth=0.5; bgCtx.strokeStyle=T.cellInner;
    bgCtx.beginPath(); bgCtx.ellipse(0,0,c.rx*0.42,c.ry*0.42,0,0,Math.PI*2); bgCtx.stroke();
  }
  bgCtx.setTransform(1,0,0,1,0,0); /* reset to identity */
  bgCtx.globalAlpha=1;
}

function drawEcgPts(t){
  const T = window._themeColors;
  const ey=getEcgY();
  bgCtx.fillStyle=T.ecgBandColor;
  /* Move all first */
  for(const p of ecgBandPts){
    if(t > EXPLODE_DURATION){ p.x+=p.vx; p.y+=p.vy; }
    if(p.x<0) p.x=bgCanvas.width; if(p.x>bgCanvas.width) p.x=0;
    if(p.y<ey-48||p.y>ey+48) p.vy*=-1;
  }
  /* Draw as one sub-path batch per particle (alpha varies, so draw individually
     but at least avoid fillStyle re-sets and minimize state changes) */
  for(const p of ecgBandPts){
    bgCtx.globalAlpha=p.alpha*(0.5+0.5*Math.sin(t*0.04+p.phase));
    bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2); bgCtx.fill();
  }
  bgCtx.globalAlpha=1;
}

animate();
</script>
